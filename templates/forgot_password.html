<!DOCTYPE html>
<html>
<head>

    <title>Şifremi Unuttum</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">
        Şifrenizi mi Unuttunuz?
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>Kullanıcı Adı</label>

            <input type="text"
                   name="username"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Email Adresi</label>

            <input type="email"
                   name="email"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Yeni Şifre</label>

            <input type="password"
                   name="new_password"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Yeni Şifre Tekrar</label>

            <input type="password"
                   name="confirm_password"
                   class="form-control"
                   required>

        </div>

        <button class="btn btn-primary">

            Şifreyi Güncelle

        </button>

    </form>

</div>

</body>
</html>
