

<!DOCTYPE html>
<html>
<head>
    <title>Kayıt Ol</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Kayıt Ol</h2>

    <form method="POST">

        <div class="mb-3">
    <label>Ad</label>

    <input type="text"
           name="first_name"
           class="form-control">
</div>

<div class="mb-3">
    <label>Soyad</label>

    <input type="text"
           name="last_name"
           class="form-control">
</div>

<div class="mb-3">
    <label>Email</label>

    <input type="email"
           name="email"
           class="form-control">
</div>

<div class="mb-3">
    <label>Telefon Numarası</label>

    <input type="text"
           name="phone"
           class="form-control">
</div>

        <div class="mb-3">
            <label>Kullanıcı Adı</label>

            <input type="text"
                   name="username"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Şifre</label>

            <input type="password"
                   name="password"
                   class="form-control">
        </div>

        <button class="btn btn-primary">
            Kayıt Ol
        </button>

    </form>

</div>

</body>
</html>
