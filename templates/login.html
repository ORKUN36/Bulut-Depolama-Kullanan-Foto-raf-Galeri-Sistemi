<!DOCTYPE html>
<html>
<head>
    <title>Giriş Yap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Giriş Yap</h2>

    <div class="alert alert-info mt-3">

    Bu fotoğraf galeri sistemini kullanabilmek için
    önce kayıt olmalı veya giriş yapmalısınız.

</div>

<div class="mb-3">

    <a href="/register"
       class="btn btn-success">

       Kayıt Ol

    </a>

</div>

    {% if request.args.get("success") %}

<div class="alert alert-success mt-3">

    🎉 Hayırlı Olsun! Artık bu siteye üyesiniz.
Şimdi girişinizi yapabilirsiniz.

</div>

{% endif %}

    <form method="POST">

        <div class="mb-3">
            <label>Kullanıcı Adı</label>

            <input type="text"
                   name="username"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Şifre</label>

            <input type="password"
                   name="password"
                   class="form-control">
        </div>

        <button class="btn btn-success">
            Giriş Yap
        </button>

        <div class="mt-3">

    <a href="/forgot-password">

        Şifrenizi mi Unuttunuz?

    </a>

</div>

    </form>

</div>

</body>
</html>
