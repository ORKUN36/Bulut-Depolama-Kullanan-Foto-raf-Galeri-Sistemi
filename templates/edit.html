<!DOCTYPE html>
<html>
<head>
    <title>Fotoğraf Düzenle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Fotoğraf Başlığını Düzenle</h1>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Başlık</label>

            <input type="text"
                   name="title"
                   class="form-control"
                   value="{{ photo.title }}">
            <p>{{ photo.title }}</p>
        </div>

        <button type="submit"
                class="btn btn-primary">
            Güncelle
        </button>

    </form>

</div>

</body>
</html>
